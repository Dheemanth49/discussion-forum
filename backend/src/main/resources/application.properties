server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:discussion_forum}}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

admin.username=${INITIAL_ADMIN_USERNAME}
admin.email=${INITIAL_ADMIN_EMAIL}
admin.password=${INITIAL_ADMIN_PASSWORD}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

embedding.service.url=${EMBEDDING_SERVICE_URL:http://${EMBEDDING_SERVICE_HOST:localhost}:${EMBEDDING_SERVICE_PORT:7645}}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

gemini.api.url=${GEMINI_API_URL}
gemini.api.key=${GEMINI_API_KEY}
gemini.api.fallback-url=${GEMINI_FALLBACK_API_URL}
